// ── AUTH & PERSISTENCE ──────────────────────────────────────────────────────
// Simple hash for password storage (not cryptographic — for localStorage only)
function hashPw(pw){let h=0;for(let i=0;i<pw.length;i++){h=((h<<5)-h)+pw.charCodeAt(i);h|=0;}return h.toString(36);}

function acctKey(email){return"ab_acct_"+email.toLowerCase().replace(/[^a-z0-9]/g,"_");}
function dataKey(email){return"ab_data_"+email.toLowerCase().replace(/[^a-z0-9]/g,"_");}

function getAllAccounts(){return JSON.parse(localStorage.getItem("ab_accounts")||"[]");}
function saveAccountIndex(email){const accts=getAllAccounts();if(!accts.includes(email.toLowerCase()))accts.push(email.toLowerCase());localStorage.setItem("ab_accounts",JSON.stringify(accts));}

function createAccount(name,email,pw){
  const e=email.toLowerCase().trim();
  const acct={name,email:e,pwHash:hashPw(pw),createdAt:Date.now()};
  localStorage.setItem(acctKey(e),JSON.stringify(acct));
  saveAccountIndex(e);
  return acct;
}

function getAccount(email){
  const raw=localStorage.getItem(acctKey(email.toLowerCase().trim()));
  return raw?JSON.parse(raw):null;
}

function checkPassword(email,pw){
  const acct=getAccount(email);
  if(!acct)return null;
  return acct.pwHash===hashPw(pw)?acct:null;
}

function generateRecoveryCode(email){
  const code=Math.floor(100000+Math.random()*900000).toString();
  const e=email.toLowerCase().trim();
  localStorage.setItem("ab_recovery_"+e,JSON.stringify({code,expires:Date.now()+3600000}));
  return code;
}

function verifyRecoveryCode(email,code){
  const raw=localStorage.getItem("ab_recovery_"+email.toLowerCase().trim());
  if(!raw)return false;
  const d=JSON.parse(raw);
  return d.code===code&&d.expires>Date.now();
}

function resetPassword(email,newPw){
  const e=email.toLowerCase().trim();
  const acct=getAccount(e);
  if(!acct)return false;
  acct.pwHash=hashPw(newPw);
  localStorage.setItem(acctKey(e),JSON.stringify(acct));
  localStorage.removeItem("ab_recovery_"+e);
  return true;
}

function savePro(){
  if(!S.profile)return;
  const d={name:S.profile.name,email:S.profile.email,productId:S.profile.productId,theme:S.theme,nicheAnswers:S.nicheAnswers,nicheResult:S.nicheResult,nicheStep:S.nicheStep,completedSteps:[...S.completedSteps],savedAt:Date.now()};
  localStorage.setItem(dataKey(S.profile.email),JSON.stringify(d));
}

function loadProData(email){
  const raw=localStorage.getItem(dataKey(email.toLowerCase().trim()));
  return raw?JSON.parse(raw):null;
}

function applyPro(acct,data){
  S.profile={name:acct.name,email:acct.email,productId:data?.productId||null};
  S.theme=data?.theme||"dark";
  S.nicheAnswers=data?.nicheAnswers||{};
  S.nicheResult=data?.nicheResult||"";
  S.nicheStep=data?.nicheResult?"result":"questions";
  S.completedSteps=new Set(data?.completedSteps||[]);
  S.tab="welcome";
  document.body.className=S.theme;
}

async function ai(sys,user,msgs){const body={model:"claude-sonnet-4-20250514",max_tokens:1000,system:sys};body.messages=msgs||[{role:"user",content:user}];const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});const d=await r.json();return d.content?.[0]?.text||"Something went wrong. Please try again.";}

function H(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function Hp(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

function render(){document.body.className=S.theme;document.getElementById("root").innerHTML=S.profile?rApp():rLogin();bind();}

function bind(){
  document.querySelectorAll("[data-theme]").forEach(el=>el.onclick=()=>{S.theme=el.dataset.theme;document.body.className=S.theme;savePro();render();});
  document.querySelectorAll("[data-tab]").forEach(el=>el.onclick=()=>{S.tab=el.dataset.tab;render();});
  document.querySelectorAll("[data-act]").forEach(el=>el.onclick=e=>act(el.dataset.act,el));
  document.querySelectorAll("[data-prod]").forEach(el=>el.onclick=()=>{S.profile.productId=el.dataset.prod;S.completedSteps.add("setup");savePro();render();});
  document.querySelectorAll("[data-cmtr]").forEach(el=>el.onclick=()=>{S.contentMentor=el.dataset.cmtr;S.contentPlatform=MENTORS[el.dataset.cmtr].platforms[0];S.contentResult="";render();});
  document.querySelectorAll("[data-plat]").forEach(el=>el.onclick=()=>{S.contentPlatform=el.dataset.plat;S.contentResult="";render();});
  document.querySelectorAll("[data-mode]").forEach(el=>el.onclick=()=>{S.contentMode=el.dataset.mode;S.contentResult="";render();});
  document.querySelectorAll("[data-cmch]").forEach(el=>el.onclick=()=>{S.coachMentor=el.dataset.cmch;S.coachMessages=[];render();});
  document.querySelectorAll("[data-nq]").forEach(el=>el.onclick=()=>{S.nicheCurrent=+el.dataset.nq;render();});
  document.querySelectorAll("[data-key]").forEach(el=>el.oninput=e=>{const k=e.target.dataset.key;if(k.startsWith("nq_"))S.nicheAnswers[k.slice(3)]=e.target.value;else if(k==="paste")S.contentPaste=e.target.value;if(S.profile)savePro();});
  document.querySelectorAll("[data-copy]").forEach(el=>el.onclick=()=>{const txt=document.getElementById(el.dataset.copy)?.innerText||"";navigator.clipboard.writeText(txt).then(()=>{el.textContent="Copied!";el.style.background="#22c55e";el.style.color="#fff";setTimeout(()=>{el.textContent="Copy";el.style.background="";el.style.color="";},2000);});});
  const ci=document.getElementById("chat-in");if(ci)ci.onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();act("coach_send");}};
  const cm=document.getElementById("chat-msgs");if(cm)cm.scrollTop=cm.scrollHeight;
}

async function act(a,el){
  if(a==="auth_tab"){LS.screen=el.dataset.screen;LS.error="";LS.errorField="";LS.success="";render();return;}
  if(a==="toggle_pw"){LS.showPw=!LS.showPw;const f=document.getElementById("pw-field");if(f)f.type=LS.showPw?"text":"password";const f2=document.getElementById("reg-pw-field");if(f2)f2.type=LS.showPw?"text":"password";return;}

  if(a==="sign_in"){
    const email=(document.getElementById("li-email")?.value||"").trim();
    const pw=(document.getElementById("li-pw")?.value||"").trim();
    if(!email||!pw){LS.error="Please enter your email and password.";render();return;}
    const acct=checkPassword(email,pw);
    if(!acct){LS.error="Incorrect email or password. Check your details and try again.";render();return;}
    const data=loadProData(email);
    applyPro(acct,data);render();return;
  }

  if(a==="register"){
    LS.regName=(document.getElementById("reg-name")?.value||"").trim();
    LS.regEmail=(document.getElementById("reg-email")?.value||"").trim();
    LS.regPw=(document.getElementById("reg-pw-field")?.value||"");
    LS.regPw2=(document.getElementById("reg-pw2-field")?.value||"");
    LS.errorField="";
    if(!LS.regName){LS.error="Please enter your first name.";LS.errorField="name";render();return;}
    if(!LS.regEmail){LS.error="Please enter your email address.";LS.errorField="email";render();return;}
    if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(LS.regEmail)){LS.error="That email doesn't look right — please check it.";LS.errorField="email";render();return;}
    if(!LS.regPw||LS.regPw.length<6){LS.error="Password must be at least 6 characters.";LS.errorField="pw";render();return;}
    if(!LS.regPw2){LS.error="Please confirm your password.";LS.errorField="pw2";render();return;}
    if(LS.regPw!==LS.regPw2){LS.error="Passwords don't match — please check and try again.";LS.errorField="pw2";render();return;}
    if(getAccount(LS.regEmail)){LS.error="An account with this email already exists. Try signing in instead.";LS.errorField="email";render();return;}
    const acct=createAccount(LS.regName,LS.regEmail,LS.regPw);
    LS.regName="";LS.regEmail="";LS.regPw="";LS.regPw2="";LS.errorField="";
    applyPro(acct,null);render();return;
  }

  if(a==="recovery_send"){
    const email=(document.getElementById("rec-email")?.value||"").trim();
    if(!email){LS.error="Please enter your email address.";render();return;}
    if(!getAccount(email)){LS.error="No account found with that email address.";render();return;}
    const code=generateRecoveryCode(email);
    LS.recEmail=email;LS.recStep="code";LS.error="";
    // Show code in a visible alert since we can't send real emails inside Claude
    LS.success="Recovery code generated! Your code is: "+code+" (in a real deployment this would be emailed to you — note it down now)";
    render();return;
  }

  if(a==="recovery_verify"){
    const code=(document.getElementById("rec-code")?.value||"").trim();
    if(!code){LS.error="Please enter the recovery code.";render();return;}
    if(!verifyRecoveryCode(LS.recEmail,code)){LS.error="Invalid or expired code. Please request a new one.";render();return;}
    LS.recStep="reset";LS.error="";LS.success="Code verified! Now set your new password.";render();return;
  }

  if(a==="recovery_reset"){
    const newPw=(document.getElementById("rec-newpw")?.value||"").trim();
    const newPw2=(document.getElementById("rec-newpw2")?.value||"").trim();
    if(!newPw||!newPw2){LS.error="Please enter and confirm your new password.";render();return;}
    if(newPw.length<6){LS.error="Password must be at least 6 characters.";render();return;}
    if(newPw!==newPw2){LS.error="Passwords do not match.";render();return;}
    resetPassword(LS.recEmail,newPw);
    LS.screen="login";LS.recStep="email";LS.error="";LS.success="Password reset successfully! You can now sign in with your new password.";render();return;
  }

  if(a==="logout"){savePro();S.profile=null;S.tab="welcome";LS.screen="login";LS.error="";LS.success="";render();return;}
  if(a==="guest"){S.profile={name:"Guest",email:"guest",productId:null};S.completedSteps=new Set();S.nicheAnswers={};S.nicheResult="";S.nicheStep="questions";S.tab="welcome";document.body.className=S.theme;render();return;}
  if(a==="quick"){const email=el.dataset.email;const acct=getAccount(email);if(!acct)return;const data=loadProData(email);applyPro(acct,data);render();return;}
  if(a==="go_niche"){S.tab="niche";render();return;}
  if(a==="go_content"){S.tab="content";render();return;}
  if(a==="go_setup"){S.tab="setup";render();return;}
  if(a==="go_daily"){S.tab="daily";render();return;}
  if(a==="content_switch"){S.contentMentor=null;S.contentResult="";render();return;}
  if(a==="coach_switch"){S.coachMentor=null;S.coachMessages=[];render();return;}
  if(a==="niche_next"){if(S.nicheCurrent<5)S.nicheCurrent++;render();return;}
  if(a==="niche_back"){if(S.nicheCurrent>0)S.nicheCurrent--;render();return;}
  if(a==="niche_reset"){S.nicheStep="questions";S.nicheResult="";S.nicheCurrent=0;render();return;}

  if(a==="niche_gen"){
    S.nicheStep="loading";render();
    const p=PRODUCTS[S.profile.productId];
    const pctx=p.id==="saf"?"PRODUCT (NEVER name it in output — say what you promote or your opportunity): Done-for-you affiliate system. One link. 8 income streams. Free to join. 146K members. Daily up to $900. 14-day automated emails. WIN: Personal brand first, story, trust, funnel closes in background.":"PRODUCT (NEVER name it — say what you promote or your health membership): Health and wellness affiliate marketing with matrix spillover. $9.95 per month. Personal health transformation story is the core angle.";
    const txt=NICHE_QS.map(q=>q.label+"\nAnswer: "+(S.nicheAnswers[q.id]||"not answered")).join("\n\n");
    const sys="You are a world-class niche strategist and personal brand coach. Use plain text with ALL CAPS section headers. No markdown symbols or bullet characters. Be specific, personal, and direct. Reference the user's actual answers — never be generic.";
    const msg="Build a personalised niche strategy for "+S.profile.name+".\n\nTHEIR ANSWERS:\n"+txt+"\n\n"+pctx+"\n\nSections:\n\nYOUR NICHE IN ONE SENTENCE: One powerful positioning statement built around this person and the transformation they offer. No product names.\n\nWHY THIS NICHE WORKS FOR YOU: Reference their specific story and background. Why is their experience an unfair advantage?\n\nYOUR IDEAL PERSON: Give them a name, age, situation, fears, and desires. Make it feel like a real person.\n\nYOUR CONTENT ANGLE: Based on their platform preference — exact tone, format, frequency. What should their first 5 posts be about?\n\nINCOME ROADMAP: Realistic 30, 60, and 90 day milestones based on their time and income goal.\n\nRED FLAGS TO AVOID: Based on what they have already tried — what traps to steer clear of.\n\nMax 520 words. Be personal. Reference their actual words. Never name any product or brand.";
    S.nicheResult=await ai(sys,msg);S.nicheStep="result";S.completedSteps.add("niche");savePro();render();return;
  }

  if(a==="content_gen"){
    if(!S.contentMentor||!S.contentPlatform)return;
    S.loading.content=true;render();
    const m=MENTORS[S.contentMentor];
    const p=PRODUCTS[S.profile.productId];

    // Pull niche answers so posts are grounded in the person's real story
    const nq=S.nicheAnswers;
    const hasNiche=nq&&Object.values(nq).some(v=>v&&v.trim().length>2);
    const nicheCtx=hasNiche?`
PERSON'S REAL STORY AND NICHE (this is the MOST IMPORTANT part — everything leads with this):
- Topics they are passionate about: ${nq.topics||"not specified"}
- Who they want to help: ${nq.audience||"not specified"}
- Their personal story and struggle: ${nq.story||"not specified"}
- Their natural platform style: ${nq.platform||"not specified"}
- Their income goal and time available: ${nq.timeGoal||"not specified"}

THE CONTENT RULE: Posts must be almost entirely about this person's story, passions, and the audience they serve. The income opportunity is mentioned only at the very end as a soft afterthought — like "oh by the way, the link in my bio is what I use" — never as the headline or focus. Lead with LIFE, not with money.`:`
PERSON: ${S.profile.name}
NOTE: No niche strategy has been completed yet. Write posts based on general authentic personal brand principles — focus on real life, real struggles, real wins. The income opportunity is only a light mention at the end.`;

    const pctx=p.id==="saf"?`INCOME OPPORTUNITY CONTEXT (background only — sprinkle lightly at the end of posts, never lead with it): Person uses a done-for-you system that earns them income online. They mention it only as "what I use", "the link in my bio", "something I found that changed things" — always as an almost-accidental discovery, never as a sales pitch.`:`INCOME OPPORTUNITY CONTEXT (background only — sprinkle lightly at the end of posts, never lead with it): Person uses a health and wellness membership that saves them money and earns them income. They mention it only as "what I take", "something I found", "the membership I use" — always incidentally, never as the focus.`;

    const sys=`You are a viral content strategist who deeply understands ${m.name}'s content style and proven frameworks. You write posts that feel like real lived experience — not marketing. The person's STORY is everything. The income mention is barely there, almost like an afterthought dropped at the end. Plain text only. No markdown. No hashtags.`;

    let msg="";

    if(S.contentMode==="fresh"){
      msg=`Write 3 viral ${S.contentPlatform} posts for ${S.profile.name}.

${nicheCtx}

${pctx}

MENTOR STYLE: ${m.name} — ${m.vibe}
FRAMEWORK: ${m.framework}
HOOK INSPIRATION (do not copy — use as style reference only): ${m.hooks.slice(0,3).join(" | ")}
VIDEO FORMAT GUIDANCE: ${m.videoFormats[0]}

CONTENT BRIEF:
- Post 1: Lead with their personal story or struggle. What was life like before? What shifted? The income thing is a tiny mention at the very end if at all.
- Post 2: Lead with their passion or the audience they help. Give real value or insight about that topic. The income thing is a one-liner at the end: "oh and the link in my bio is how I earn from this"
- Post 3: Lead with a relatable moment, feeling, or observation from their real life. The income angle is so soft it almost feels accidental.

CRITICAL RULES:
- NEVER mention any product name or brand name
- The income opportunity should feel like a footnote, not the point
- If someone read these posts they should think "this person is genuinely living this life" not "this person is trying to sell me something"
- Write in first person as ${S.profile.name}
- Each post a completely different angle

Separate posts with ---`;
    }

    else if(S.contentMode==="hook"){
      msg=`Write 10 scroll-stopping hooks in ${m.name}'s style for ${S.contentPlatform}.

${nicheCtx}

MENTOR HOOK STYLE: ${m.hooks.join(" | ")}
MENTOR VOICE: ${m.vibe}

HOOK BRIEF:
Hooks should be about the person's real life, their passion topics, or the audience they serve. NOT about making money. Think: what would stop someone in this person's target audience mid-scroll because it spoke directly to their life?

Examples of the RIGHT energy:
- Something about their passion topic that their audience deeply relates to
- A bold truth about the struggle their audience faces
- A surprising observation about their niche topic
- A before/after moment from their real life

CRITICAL: No income or money hooks. No "how I made X" hooks. Pure life, passion, and audience connection. Under 12 words each. Number 1 to 10.`;
    }

    else{
      const paste=(document.getElementById("paste-box")?.value||S.contentPaste||"").trim();
      msg=`Remix this viral post for ${S.profile.name} on ${S.contentPlatform} in ${m.name}'s authentic style.

ORIGINAL POST TO REMIX:
"${paste}"

${nicheCtx}

${pctx}

MENTOR: ${m.name} — ${m.vibe}
FRAMEWORK: ${m.framework}

REMIX BRIEF:
Keep the energy and structure that makes the original post viral. But rewrite it so it:
- Feels like it comes from ${S.profile.name}'s real life and story
- Speaks to their specific audience
- Connects to their passion topics
- Only mentions the income opportunity as a very light afterthought at the end if relevant at all

CRITICAL: No product names. Return only the rewritten post.`;
    }

    S.contentResult=await ai(sys,msg);
    S.loading.content=false;S.completedSteps.add("content");savePro();render();return;
  }

  if(a==="daily_gen"){
    S.loading.daily=true;render();
    const p=PRODUCTS[S.profile.productId];
    const nq=S.nicheAnswers;
    const hasNiche=nq&&Object.values(nq).some(v=>v&&v.trim().length>2);
    const nicheHint=hasNiche?`THEIR NICHE CONTEXT: They talk about "${nq.topics||""}" and help "${nq.audience||""}". Their story: "${nq.story||""}". Platform style: ${nq.platform||""}. Income goal: ${nq.timeGoal||""}.`:"";
    const hints=p.id==="saf"?"Their online income comes from a done-for-you affiliate system. Their job is creating authentic content and driving traffic — the system handles everything else.":"Their online income comes from sharing health and wellness products they personally use through an affiliate membership.";

    S.dailyResult=await ai(sys,msg);S.loading.daily=false;S.completedSteps.add("daily");savePro();render();return;
  }

  if(a==="coach_send"){
    const input=(document.getElementById("chat-in")?.value||"").trim();if(!input||S.coachLoading)return;
    S.coachLoading=true;S.coachMessages.push({role:"user",content:input});render();
    const m=MENTORS[S.coachMentor];const p=S.profile.productId?PRODUCTS[S.profile.productId]:null;
    const pctx=p?.id==="saf"?"Person promotes a done-for-you affiliate income system. NEVER name it. Say what you promote or your system.":p?.id==="livegood"?"Person promotes a health and wellness affiliate membership with matrix spillover. NEVER name it. Say what you promote.":"";

    const reply=await ai(sys,null,S.coachMessages);S.coachMessages.push({role:"assistant",content:reply});S.coachLoading=false;S.completedSteps.add("coach");savePro();render();return;
  }
}

function rNiche(){if(!S.profile.productId)return`<p class="t-sub" style="font-size:15px">Please select your product in Step 1 first.</p>`;if(S.nicheStep==="loading")return`<div style="padding:44px 0;display:flex;flex-direction:column;align-items:center;gap:18px"><div class="spin spin-dark" style="width:46px;height:46px;border-width:4px"></div><div class="t-sub" style="font-size:16px;text-align:center;line-height:1.7">Building your personalised niche strategy...<br><span class="t-muted" style="font-size:14px">This uses your answers to create something truly yours</span></div></div>`;if(S.nicheStep==="result")return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><div style="color:#8b5cf6;font-weight:700;font-size:18px">🧠 Your Niche Strategy</div><button class="btn btn-ghost" data-act="niche_reset" style="padding:8px 16px;font-size:14px">Redo</button></div>${rBox("niche-out",S.nicheResult,"#8b5cf6")}<div class="card" style="margin-top:16px;border-color:#ec489944;display:flex;gap:13px;align-items:center"><span style="font-size:26px">✨</span><div style="flex:1"><div style="color:#ec4899;font-weight:700;font-size:15px;margin-bottom:3px">Strategy ready! Now go to Step 3 →</div><div class="t-muted" style="font-size:14px">Head to 3. Content to start creating posts using your mentor's viral frameworks</div></div><button class="btn btn-ghost" data-act="go_content" style="padding:10px 16px;font-size:14px;flex-shrink:0">Next →</button></div>`;const ans=NICHE_QS.filter(q=>(S.nicheAnswers[q.id]||"").trim().length>2).length;const pct=Math.round((ans/NICHE_QS.length)*100);const q=NICHE_QS[S.nicheCurrent];const allDone=ans===NICHE_QS.length;return`${sBanner("🧠","#8b5cf6","Step 2 — Build Your Niche","Answer 6 honest questions about YOU. The app builds a personalised strategy combining what you love with what actually makes money.","Answer all 6 questions as honestly as possible, then tap Build My Strategy and save the result.","10 to 15 min","Day 1 or 2 — revisit monthly","The more specific your answers, the more personalised and useful your strategy will be. Do not rush this step.")}<div style="margin-bottom:20px"><div style="display:flex;justify-content:space-between;margin-bottom:9px"><span class="t-muted" style="font-size:15px">${ans} of ${NICHE_QS.length} answered</span><span style="color:#8b5cf6;font-size:15px;font-weight:700">${pct}%</span></div><div style="background:var(--border);border-radius:5px;height:7px"><div style="background:#8b5cf6;height:7px;border-radius:5px;width:${pct}%;transition:width 0.3s"></div></div></div><div style="display:flex;gap:7px;margin-bottom:20px;flex-wrap:wrap">${NICHE_QS.map((nq,i)=>{const a=(S.nicheAnswers[nq.id]||"").trim().length>2;const act=S.nicheCurrent===i;return`<button data-nq="${i}" style="width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;font-weight:700;font-size:14px;background:${act?"#8b5cf6":a?"#22c55e20":"var(--card)"};color:${act?"#fff":a?"#22c55e":"var(--muted)"};outline:${act?"2px solid #8b5cf6":"2px solid var(--border)"};outline-offset:2px;transition:all 0.15s">${a?"✓":i+1}</button>`;}).join("")}</div><div class="card" style="border-color:#8b5cf640;margin-bottom:16px;animation:slideIn 0.2s ease"><div style="color:#8b5cf6;font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:10px">QUESTION ${S.nicheCurrent+1} OF ${NICHE_QS.length}</div><div style="font-size:16px;font-weight:700;margin-bottom:7px;line-height:1.5;color:var(--text)">${q.label}</div><div class="t-muted" style="font-size:14px;margin-bottom:14px;font-style:italic">💡 ${q.hint}</div><textarea data-key="nq_${q.id}" rows="4" placeholder="${q.placeholder}" style="resize:vertical;font-size:15px;line-height:1.6">${Hp(S.nicheAnswers[q.id]||"")}</textarea></div><div style="display:flex;gap:10px;margin-bottom:20px">${S.nicheCurrent>0?`<button class="btn btn-ghost" data-act="niche_back" style="padding:12px 20px;font-size:15px">← Back</button>`:""} ${S.nicheCurrent<5?`<button class="btn btn-ghost" data-act="niche_next" style="padding:12px 20px;font-size:15px">Next →</button>`:""}</div>${allDone?`<div style="animation:fadeIn 0.3s ease"><div class="card" style="border-color:#22c55e44;display:flex;gap:11px;align-items:center;margin-bottom:14px"><span style="font-size:22px">✅</span><span style="color:#22c55e;font-size:15px;font-weight:600">All questions answered — ready to build your strategy!</span></div><button class="btn btn-purple" data-act="niche_gen" style="width:100%;padding:15px;font-size:17px">🧠 Build My Personalised Niche Strategy</button></div>`:""}`;}

function rContent(){if(!S.contentMentor)return`${sBanner("✨","#ec4899","Step 3 — Create Your Content","Pick a mentor and generate posts using their actual viral hooks and frameworks, adapted for your voice and product.","Pick a mentor, pick your platform, choose Fresh Posts, Hook Generator, or Remix, generate, then rewrite in your own voice before posting.","5 to 10 min per session","Every day you create content","Never post AI content word for word. Rewrite in your own voice with your own story. That is what makes it convert.")}<div style="font-size:16px;font-weight:700;margin-bottom:14px">✨ Pick a mentor whose style resonates with you:</div><div style="display:flex;flex-direction:column;gap:10px">${Object.values(MENTORS).map(m=>`<button data-cmtr="${m.id}" style="background:var(--card);border:2px solid ${m.color}44;border-radius:14px;padding:15px 18px;text-align:left;display:flex;gap:14px;align-items:center;cursor:pointer;transition:all 0.2s"><div style="width:44px;height:44px;border-radius:11px;background:${m.color}20;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${m.emoji}</div><div style="flex:1"><div style="color:var(--text);font-weight:700;font-size:15px;margin-bottom:3px">${m.name}</div><div class="t-muted" style="font-size:13px;margin-bottom:2px">${m.handle} · ${m.platforms.join(", ")}</div><div class="t-sub" style="font-size:13px;line-height:1.5">${m.vibe.split(".")[0]}.</div></div><span style="color:${m.color};font-size:18px;flex-shrink:0">→</span></button>`).join("")}</div>`;const m=MENTORS[S.contentMentor];const loading=S.loading.content;return`<div style="background:${m.color}12;border:2px solid ${m.color}33;border-radius:12px;padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;gap:11px"><span style="font-size:22px">${m.emoji}</span><div style="flex:1"><div style="color:${m.color};font-weight:700;font-size:15px">${m.name} Framework</div><div class="t-muted" style="font-size:13px;margin-top:2px">${m.vibe.split(".")[0]}.</div></div><button class="btn btn-ghost" data-act="content_switch" style="padding:7px 14px;font-size:13px">Switch</button></div><label style="display:block;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:10px">PLATFORM</label><div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">${m.platforms.map(pl=>`<button data-plat="${pl}" style="padding:10px 18px;border-radius:22px;border:none;font-size:14px;font-weight:${S.contentPlatform===pl?700:500};background:${S.contentPlatform===pl?m.color:"var(--card)"};color:${S.contentPlatform===pl?"#fff":"var(--sub)"};cursor:pointer;transition:all 0.15s">${pl}</button>`).join("")}</div><label style="display:block;font-size:13px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:10px">CONTENT TYPE</label><div style="display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap">${[{id:"fresh",label:"✨ Fresh Posts"},{id:"hook",label:"🎣 Hook Generator"},{id:"remix",label:"🔁 Remix a Post"}].map(md=>`<button data-mode="${md.id}" style="padding:10px 18px;border-radius:22px;border:none;font-size:14px;font-weight:${S.contentMode===md.id?700:500};background:${S.contentMode===md.id?"#f97316":"var(--card)"};color:${S.contentMode===md.id?"#fff":"var(--sub)"};cursor:pointer;transition:all 0.15s">${md.label}</button>`).join("")}</div>${S.contentMode==="remix"?`<label style="display:block;font-size:15px;font-weight:700;margin-bottom:9px">Paste the viral post you want to remix:</label><textarea id="paste-box" data-key="paste" rows="4" placeholder="Paste any viral post from TikTok, Instagram, or Facebook..." style="margin-bottom:16px;resize:vertical;font-size:15px;line-height:1.6">${Hp(S.contentPaste)}</textarea>`:""}<button class="btn btn-orange" data-act="content_gen" ${loading||!S.contentPlatform?"disabled":""} style="width:100%;padding:15px;font-size:16px;margin-bottom:6px">${loading?`<div class="spin spin-dark"></div> Creating...`:S.contentMode==="fresh"?"✨ Generate 3 "+m.name+"-Style Posts":S.contentMode==="hook"?"🎣 Generate 10 Viral Hooks":"🔁 Remix This Post"}</button>${!S.contentPlatform?`<p style="color:#f97316;font-size:14px;margin-top:4px">← Select a platform above first</p>`:""} ${rBox("content-out",S.contentResult,m.color)}`;}

function rDaily(){const loading=S.loading.daily;const today=new Date().toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});return`${sBanner("📋","#22c55e","Step 4 — Daily Drop","Your personalised action plan for today — exactly what to do, in order, with no fluff.","Open every morning, read your plan, then do the 3 tasks in order. Do not skip any of them.","2 min to read, 1 to 3 hrs to execute","Every morning before you start working","The Daily Drop only works if you actually do the actions. Reading it and doing nothing is the most common mistake new online earners make.")}<div class="card" style="margin-bottom:18px;display:flex;gap:13px;align-items:center"><span style="font-size:22px">📅</span><div><div style="font-size:16px;font-weight:700">${today}</div><div class="t-muted" style="font-size:14px">Your personalised plan for today</div></div></div><button class="btn btn-green" data-act="daily_gen" ${loading?"disabled":""} style="width:100%;padding:15px;font-size:17px;margin-bottom:18px">${loading?`<div class="spin spin-dark"></div> Building your daily plan...`:"📋 Get Today's Drop"}</button>${rBox("daily-out",S.dailyResult,"#22c55e")}`;}

function rCoach(){if(!S.coachMentor)return`${sBanner("💬","#06b6d4","Step 5 — AI Coach","Chat with an AI coach trained in your chosen mentor's framework. Ask anything about strategy, content, handling objections, or what to do next.","Pick your mentor, type your question, and be very specific for the best answer.","As needed","Whenever you are stuck, confused, or need direction","Be specific. What should I post? gets a generic answer. I have 30 minutes, 52 followers, my audience is mums over 40 — what do I post today? gets a real answer.")}<div style="font-size:16px;font-weight:700;margin-bottom:14px">💬 Who do you want to be coached by today?</div><div style="display:flex;flex-direction:column;gap:10px">${Object.values(MENTORS).map(m=>`<button data-cmch="${m.id}" style="background:var(--card);border:2px solid ${m.color}44;border-radius:14px;padding:15px 18px;text-align:left;display:flex;gap:14px;align-items:center;cursor:pointer;transition:all 0.2s"><div style="width:44px;height:44px;border-radius:11px;background:${m.color}20;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0">${m.emoji}</div><div style="flex:1"><div style="color:var(--text);font-weight:700;font-size:15px;margin-bottom:3px">${m.name}</div><div class="t-sub" style="font-size:14px;line-height:1.5">${m.vibe.split(".")[0]}.</div></div><span style="color:${m.color};font-size:18px">→</span></button>`).join("")}</div>`;const m=MENTORS[S.coachMentor];return`<div style="background:${m.color}12;border:2px solid ${m.color}33;border-radius:12px;padding:11px 17px;margin-bottom:16px;display:flex;gap:11px;align-items:center"><span style="font-size:20px">${m.emoji}</span><div style="flex:1;color:${m.color};font-weight:700;font-size:15px">${m.name} — AI Coach</div><button class="btn btn-ghost" data-act="coach_switch" style="padding:6px 13px;font-size:13px">Switch</button></div><div id="chat-msgs" style="height:370px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;margin-bottom:14px;padding:4px 0">${S.coachMessages.length===0?`<div class="card" style="font-size:15px;line-height:1.8;color:var(--sub)">👋 Hey ${H(S.profile.name)}! I am your AI coach, inspired by ${m.name}'s approach and framework. Ask me anything — strategy, what to post, how to handle objections, what to do next. The more specific your question, the better my answer.</div>`:""} ${S.coachMessages.map(msg=>`<div class="${msg.role==="user"?"bubble-me":"bubble-ai"}">${H(msg.content)}</div>`).join("")} ${S.coachLoading?`<div style="align-self:flex-start;display:flex;gap:9px;align-items:center;color:var(--muted);font-size:15px"><div class="spin spin-dark"></div> Thinking...</div>`:""}</div><div style="display:flex;gap:10px"><input id="chat-in" placeholder="Ask your coach anything — be specific..." style="flex:1;font-size:15px"/><button class="btn btn-cyan" data-act="coach_send" ${S.coachLoading?"disabled":""} style="padding:12px 18px;font-size:20px;flex-shrink:0">→</button></div><p class="t-muted" style="font-size:13px;margin-top:6px">Press Enter to send</p>`;}

document.body.className=S.theme;
render();
</script>
</body>
</html>
